# Docker Compose — Compatible con Windows (Docker Desktop) y Linux
# Requisito: Docker Desktop con WSL2 backend (recomendado en Windows)
#
# Los datos de MySQL se almacenan en ./data/mysql/ dentro del proyecto.
# ⚠ NO subir la carpeta data/ a Git (ya incluida en .gitignore).

services:
  db:
    image: mysql:8.0
    platform: linux/amd64   # Necesario si usas Windows ARM o Apple Silicon
    container_name: mysql-db
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    ports:
      # Exponer solo localmente (127.0.0.1) por seguridad
      - "127.0.0.1:3306:3306"
    volumes:
      # Datos persistentes en carpeta local del proyecto
      - ./data/mysql:/var/lib/mysql
      # Script de inicialización (solo lectura)
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    tmpfs:
      # Directorios temporales en RAM (más seguro, no persisten)
      - /tmp:size=64M
      - /run/mysqld:size=8M
    security_opt:
      # Nota: esta opción es ignorada en Docker Desktop para Windows (no produce error)
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
